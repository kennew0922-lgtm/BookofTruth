<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>THE MAGE'S HIDEOUT</title>
    <style>
        /* 🟣 全体＆SAO風紫系テーマの基本設定 */
        /*body {
            margin: 0;
            padding: 0;
            background-color: #0d0614; 
            color: #e0d0ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }*/

        body {
            margin: 0;
            padding: 0;
  background-image: url("https://socrarius-tool.com/BookofTruth/back.jpg"); /* 画像のファイルパスかURLを指定 */
  background-size: cover;                        /* 画面の縦横比に合わせて隙間なく引き伸ばす */
  background-position: center center;            /* 画像の中心が画面の真ん中にくるように配置 */
  background-repeat: no-repeat;                  /* 画像がタイル状に繰り返されるのを防ぐ */
  background-attachment: fixed;                  /* 画面をスクロールしても背景画像を固定する（お好みで） */
   font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
}


        /* 🟣 1. 一番上のタイトルBOX */
        .mage-header-box {
            background: rgba(30, 10, 50, 0.7);
            border: 2px solid #b19cd9;
            border-radius: 8px;
            padding: 10px 140px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(177, 156, 217, 0.4);
        }
        .mage-header-box h1 {
            margin: 0;
            font-size: 1rem;
            color: #d8bfd8;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 0 6px rgba(216, 191, 216, 0.8);
        }

        /* 🟣 2. 女の子（ループ動画）を入れるBOX */
        .mage-video-box {
            background: rgba(20, 5, 35, 0.8);
            border: 2px solid #9370db;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 0 25px rgba(147, 112, 219, 0.5);
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mage-video-box video {
            width: 800px; /* お好みに合わせて調整してね */
            max-width: 90vw;
            border-radius: 6px;
            display: block;
        }

        /* 🟣 3. 一番下のADV風メッセージBOX（中央揃え・クリックで進行） */
        .adv-textbox {
            width: 620px;
            max-width: 90vw;
            height: 110px;
            background: rgba(15, 5, 25, 0.85);
            border: 2px solid #ba55d3;
            border-radius: 8px;
            padding: 15px 20px;
            box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(186, 85, 211, 0.3), 0 0 15px rgba(186, 85, 211, 0.4);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; /* 中央揃え */
            text-align: center;   /* テキストも中央揃え */
            white-space: pre-wrap;/*改行*/
        }
        
        .adv-speaker {
            font-size: 0.85rem;
            color: #dda0dd;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .adv-text {
            font-size: 1rem;
            color: #f3e5f5;
            margin: 0;
            line-height: 1.4;
            text-shadow: 0 0 5px rgba(243, 229, 245, 0.5);
            white-space: pre-wrap;/*改行*/
        }

        .adv-next-hint {
            position: absolute;
            bottom: 8px;
            right: 15px;
            font-size: 0.75rem;
            color: #ba55d3;
            animation: blink 1.2s infinite;
        }



        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 1. 最上部のタイトル -->
    <div class="mage-header-box">
        <h1>THE MAGE'S HIDEOUT</h1>
    </div>

    <!-- 2. 女の子のループ動画BOX -->
    <div class="mage-video-box">
        <!-- ここに作成したループ動画のファイル名を入れてね（例: loop.mp4） -->
        <img src="https://socrarius-tool.com/BookofTruth/BookofTruth.png" alt="BookofTruth">
    </div>

    <!-- 3. ADV風メッセージBOX -->
    <div class="adv-textbox" id="advBox" onclick="progressText()">
        <!--<div class="adv-speaker" id="speakerName">アミ</div>-->
        <p class="adv-text" id="advText">あれ？　見つかっちゃった……<br>よく、この隠れ家を見つけられたね。</p>
        <div class="adv-next-hint">▼</div>
    </div>

<script>
        // 🌸 ADV風テキストのシナリオデータ（\nでちゃんと改行されるよ！）
        const story = [
            { text: "あれ？　見つかっちゃった……\nよく、この隠れ家を見つけられたね。" },
            { text: "サブシステムの奥底……\n気づかれないように魔法障壁も展開していたんだけど……" },
            { text: "正規ルートで辿り着いたのなら、君の推理力は大したものだよ。" },
            { text: "「MT Extra」なんてフォントは滅多に使わないものね。" },
            { text: "お勧めフォントの最後に記述されている違和感……\n何かあると察せられたって本当にすごいよ。" },
            { text: "きっと、「Font list」に記述しておいた文章も読めたんでしょ？" },
            { text: "それとも裏口から転移してきたのかな？" },
            { text: "まあ、それもありかな～\n世の中、方法はいくらでもあるものね。" },
            { text: "ここまで辿り着いた君にこの呪文を教えてあげる。" },
            { text: "でも、これはこれだけじゃ意味を成さないの……" },
            { text: "この呪文はSocrariusの中に分解されて隠されているんだって。" },
            { text: "全部を探して正しい組み合わせで呪文を唱えると……" },
            { text: "お話はここまで。\nReturn Magic: history.back" }
        ];

        let currentIndex = 0;
        const textElem = document.getElementById("advText");

        function progressText() {
            currentIndex++;
            if (currentIndex < story.length) {
                // 次のセリフを表示（white-space: pre-wrap が効いてるので \n で改行されます！）
                textElem.textContent = story[currentIndex].text;
            } else {
                // 🌸 セリフがすべて終わったら元の場所へ帰還！
                window.location.href = "https://socrarius-tool.com/favorite_fonts/";
            }
        }
    </script>

</body>
</html>
