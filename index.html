<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font list</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #eeeeee;
        }

        /* タイトルバナー（高さ65px） */
        .title-banner {
            background-color: #000000;
            height: 65px; 
            box-sizing: border-box;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
        }

         /* ✨ 変更：バナー用のラッパー（画像がはみ出さないように中央に包む） */
        .banner-container {
            width: 100%;
            background-color: #000000; /* 画像の背景を黒にして馴染ませる */
            text-align: center;       /* 画像を中央揃えにする */
        }

        /* ✨ 変更：最上部の画像（固定せず、画面幅に合わせて伸縮するだけ） */
        .top-banner-img {
            display: block;
            width: 100%;         /* 画面の横幅いっぱいに広げる */
            max-width: 900px;    /* テーブルの最大幅と合わせて一体感を出す */
            height: auto;        /* 縦横比を崩さずに拡大縮小 */
            margin: 0 auto;      /* 中央揃え */
        }

        /* --- 🌸 ヘッダー（黒バー＋ナビ）だけを固定！ --- */
        .fixed-header {
            position: fixed;
            /* 💡 魔法のポイント：top: 0 ではなく、初期状態は通常配置、スクロール時に上部に張り付くように設定！ */
            position: -webkit-sticky; /* サファリ用 */
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999; /* 重なり順を一番上に */
            background-color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .title-banner h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #00a8ff;
            border-left: 5px solid #008eb6;
            padding-left: 15px;
            line-height: 1.2;
        }

        /* ナビゲーションバー（高さ35px） */
        .nav-bar {
            background-color: #000000;
            height: 35px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end;
            padding: 0 10px;
            align-items: center;
            border-bottom: 2px solid #008eb6;
        }

        .nav-bar a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0 15px;
            line-height: 35px;
            border-right: 1px solid #444;
            transition: color 0.3s;
        }

        /* --- コンテンツエリア --- */
        .container {
            max-width: 900px;
            margin: 0 auto;
            /* 🌸 ヘッダーの合計(100px)＋余白分を確保 */
            padding-top: 20px; 
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #2b2b2b;
            border-radius: 8px;
            overflow: hidden;
        }

        /* --- 🌸 運命の「Shape Name」バーの固定設定 --- */
        th {
            background-color: #008eb6;
            color: white;
            position: sticky;
            /* 🌸 ヘッダー合計 100px の位置に吸着！ */
            top: 0px; 
            z-index: 100;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #3d3d3d;
        }

        .preview-img {
            max-width: 300px;
            height: auto;
            border-radius: 4px;
        }

        /* 🌸 セクションタイトル（追加） */
        .section-title {
            background: #000;
            color: #00f2fe;
            padding: 8px 15px;
            margin: 15px 0 15px 0;
            font-size: 14px;
            font-weight: bold;
            border-left: 4px solid #00f2fe;
            letter-spacing: 2px;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);


/* 🌸 リンクであることを悟らせないためのステルス術式 */
    .secret-link {
        display: inline-block;
        /* マウスカーソルを通常のポインタ（矢印など）に固定して「リンクっぽさ」を消す */
        cursor: default; 
        /* もし完全に通常のカーソルにしたければ 'auto' でもOKよ */
    }

    /* ついでに画像自体のホバー効果（拡大や枠線の変化など）を完全に無効化しておくと完璧 */
    .secret-link .preview-img {
        pointer-events: auto; /* クリック判定だけはしっかり残す */
        transition: none;     /* 余計なアニメーションは排除！ */
    }
    
    /* もしリンクの下線が自動でついちゃう環境なら消しておくわ */
    .secret-link:hover, .secret-link:active {
        text-decoration: none;
    }



    </style>
</head>
